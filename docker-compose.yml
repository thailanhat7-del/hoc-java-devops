version: '3.8'

services:
  # Hộp 1: Database
  db:
    image: mysql:8.0
    container_name: my_database
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: hoc_devops_db
      MYSQL_USER: yen_user
      MYSQL_PASSWORD: yenpassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Hộp 2A: Java Sinh đôi số 1
  backend1:
    image: ghcr.io/thailanhat7-del/hoc-java-devops:latest
    container_name: java_app_1
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/hoc_devops_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=yen_user
      - SPRING_DATASOURCE_PASSWORD=yenpassword
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update 
    depends_on:
      db:
        condition: service_healthy
    restart: always

  # Hộp 2B: Java Sinh đôi số 2 (Y hệt số 1)
  backend2:
    image: ghcr.io/thailanhat7-del/hoc-java-devops:latest
    container_name: java_app_2
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/hoc_devops_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=yen_user
      - SPRING_DATASOURCE_PASSWORD=yenpassword
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update 
    depends_on:
      db:
        condition: service_healthy
    restart: always

  # Hộp 3: Lễ tân Nginx 
  nginx:
    image: nginx:latest
    container_name: my_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend:/usr/share/nginx/html
      - ./nginx/ssl:/etc/nginx/ssl # NÉM THƯ MỤC CHỨA KHÓA VÀO CHO NGINX CẦM
    depends_on:
      - backend1
      - backend2
    restart: always

# Khai báo ổ cứng dùng chung (Chỉ ghi 1 lần duy nhất ở cuối file)
volumes:
  db_data: