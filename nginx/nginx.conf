# Khai báo cụm Java Backend (Giữ nguyên)
upstream my_java_cluster {
    server backend1:8080;
    server backend2:8080;
}

# --- CỬA SỐ 80 (HTTP Thường) ---
server {
    listen 80;
    server_name localhost;

    # Hễ ai vào cửa này, tự động bắt quay xe sang đuôi HTTPS
    return 301 https://$host$request_uri;
}

# --- CỬA SỐ 443 (HTTPS Bảo mật) ---
server {
    listen 443 ssl;
    server_name localhost;

    # Đưa cho Nginx cặp khóa vừa rèn ở Công đoạn 1
    ssl_certificate /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;

    # Giao diện Frontend
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Chuyển xuống nhóm Java Backend
    location /api/ {
        proxy_pass http://my_java_cluster;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}