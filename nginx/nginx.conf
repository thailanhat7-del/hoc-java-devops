# THÊM MỚI: Khai báo nhóm máy chủ Backend
upstream my_java_cluster {
    server backend1:8080; # Máy số 1
    server backend2:8080; # Máy số 2
}

server {
    listen 80;
    server_name localhost;

    # Khu vực 1: Phục vụ file giao diện Frontend (Giữ nguyên)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Khu vực 2: Chỉ đường vào nhóm Backend
    location /api/ {
        # SỬA LẠI: Thay vì trỏ thẳng vào http://backend:8080, giờ trỏ vào nhóm!
        proxy_pass http://my_java_cluster; 
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}