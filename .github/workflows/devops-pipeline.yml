name: Tự Động Build Hệ Thống (CI Pipeline)

# Kịch bản này sẽ tự động chạy khi push hoặc tạo pull_request vào nhánh main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest # Robot sẽ mượn 1 con server Linux trống của GitHub để chạy
    steps:
    # Bước 1: Robot tự động kéo code từ GitHub của bạn về máy nó
    - name: Kéo code mới nhất về
      uses: actions/checkout@v4

    # Bước 2: Robot tự cài đặt môi trường Java 17 để chuẩn bị dịch code
    - name: Cài đặt Java 17 (JDK)
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # Bước 3: Robot tự chạy toàn bộ các bài Test
    - name: Chạy Automation Test bằng Maven
      run: mvn clean test
      
    # Bước 4: Đăng nhập vào Chợ ứng dụng của GitHub (GitHub Container Registry)
    - name: Đăng nhập vào GitHub Packages
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # Bước 5: Đóng gói Docker Image và ném thẳng lên Chợ
    - name: Build và Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ghcr.io/${{ github.repository }}:latest
        
